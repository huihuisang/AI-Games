<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大富翁 - 网页版</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="game-container">
      <!-- 游戏开始界面 -->
      <div id="start-screen" class="screen">
        <h1>大富翁</h1>
        <div class="player-setup">
          <h2>选择玩家数量</h2>
          <div class="player-options">
            <label>
              <select id="player-count">
                <option value="2" selected>2名玩家</option>
                <option value="3">3名玩家</option>
                <option value="4">4名玩家</option>
              </select>
            </label>
          </div>
          <p class="hint">玩家1由你操控，其余为电脑AI</p>
          <button id="start-game">开始游戏</button>
        </div>
      </div>

      <!-- 游戏主界面 -->
      <div id="game-screen" class="screen hidden">
        <!-- 游戏棋盘 -->
        <div id="board-area">
          <canvas id="board-canvas"></canvas>
        </div>

        <!-- 游戏信息面板 -->
        <div id="game-info">
          <div id="players-info"></div>

          <div id="dice-area">
            <div id="dice-container">
              <div class="dice" id="dice1">&#9856;</div>
              <div class="dice" id="dice2">&#9856;</div>
            </div>
            <button id="roll-dice" disabled>投掷骰子</button>
          </div>

          <div id="action-buttons">
            <button id="buy-property" class="btn-buy" disabled>购买地产</button>
            <button id="build-house" class="btn-build" disabled>建造房屋</button>
            <button id="end-turn" class="btn-end" disabled>结束回合</button>
          </div>

          <div id="message-box"></div>
        </div>
      </div>

      <!-- 卡牌弹窗 -->
      <div id="card-modal" class="modal hidden">
        <div class="modal-content">
          <div id="card-icon"></div>
          <h3 id="card-title"></h3>
          <p id="card-description"></p>
          <button id="card-ok">确定</button>
        </div>
      </div>
    </div>

    <script src="board.js"></script>
    <script src="cards.js"></script>
    <script src="player.js"></script>
    <script src="game.js"></script>
    <script>
      window.addEventListener("load", function () {
        try {
          window.game = new MonopolyGame();
        } catch (error) {
          console.error("游戏初始化失败:", error);
        }
      });
    </script>
  </body>
</html>
