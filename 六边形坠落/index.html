<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>六边形坠落</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      touch-action: none;
    }
    canvas { display: block; }

    /* 覆盖层 */
    .overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      pointer-events: none;
    }
    .overlay.active { pointer-events: auto; }
    .overlay-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .overlay.active .overlay-bg { opacity: 1; }
    .overlay-content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #fff;
      transform: scale(0.8);
      opacity: 0;
      transition: all 0.3s ease;
    }
    .overlay.active .overlay-content { transform: scale(1); opacity: 1; }

    .overlay h1 { font-size: 2.6em; margin-bottom: 8px; }
    .overlay h2 { font-size: 1.8em; margin-bottom: 16px; }
    .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 6px; font-size: 1em; line-height: 1.6; }
    .overlay .score-text { font-size: 1.4em; color: #ffd200; margin: 12px 0; }
    .overlay .record-text { font-size: 1.05em; color: #ff6b9d; margin-bottom: 20px; }
    .overlay button {
      padding: 14px 48px;
      font-size: 1.15em;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(247,151,30,0.3);
      margin-top: 10px;
    }
    .overlay button:hover { transform: translateY(-2px); }
    .overlay button:active { transform: translateY(0); }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="start-overlay" class="overlay active">
    <div class="overlay-bg"></div>
    <div class="overlay-content">
      <h1>⬡ 六边形坠落</h1>
      <p>控制小球穿过旋转的六边形缺口</p>
      <p>⬅️ 点左半屏向左 | 点右半屏向右 ➡️</p>
      <p>或用键盘 ← → 方向键</p>
      <button onclick="game.begin()">开始游戏</button>
    </div>
  </div>

  <div id="over-overlay" class="overlay">
    <div class="overlay-bg"></div>
    <div class="overlay-content">
      <h2>游戏结束</h2>
      <div class="score-text" id="final-score"></div>
      <div class="record-text" id="final-record"></div>
      <button onclick="game.begin()">再来一次</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
